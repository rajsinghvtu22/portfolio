<svg xmlns="http://www.w3.org/2000/svg" width="980" height="620" viewBox="0 0 980 620" role="img" aria-labelledby="title desc">
  <title id="title">AI systems map</title>
  <desc id="desc">A neural network inspired visualization showing computer vision, NLP, OCR, and analytics modules connected in a production system.</desc>
  <defs>
    <linearGradient id="line" x1="120" y1="110" x2="850" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#63e6e2"/>
      <stop offset=".5" stop-color="#ff5dd6"/>
      <stop offset="1" stop-color="#ffd166"/>
    </linearGradient>
    <radialGradient id="node" cx="50%" cy="50%" r="50%">
      <stop stop-color="#ffffff"/>
      <stop offset=".35" stop-color="#63e6e2"/>
      <stop offset="1" stop-color="#223447"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="980" height="620" fill="#07090d"/>
  <g opacity=".2" stroke="#ffffff" stroke-width="1">
    <path d="M0 80h980M0 160h980M0 240h980M0 320h980M0 400h980M0 480h980M0 560h980"/>
    <path d="M80 0v620M160 0v620M240 0v620M320 0v620M400 0v620M480 0v620M560 0v620M640 0v620M720 0v620M800 0v620M880 0v620"/>
  </g>
  <g fill="none" stroke="url(#line)" stroke-width="3" opacity=".86" filter="url(#glow)">
    <path d="M130 320C260 190 363 153 485 245S670 432 843 288"/>
    <path d="M178 160c116 88 199 117 320 70s214-63 326 38"/>
    <path d="M166 462c88-96 191-124 309-74s225 68 360-38"/>
    <path d="M252 86c21 135 96 214 224 238s215 81 260 205"/>
  </g>
  <g font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">
    <g transform="translate(92 274)">
      <rect width="178" height="92" rx="8" fill="#10151f" stroke="#63e6e2" opacity=".95"/>
      <text x="24" y="38" fill="#f8fbff">Vision</text>
      <text x="24" y="66" fill="#9fb0c4" font-size="15" font-weight="500">YOLO + OpenCV</text>
    </g>
    <g transform="translate(392 198)">
      <rect width="190" height="96" rx="8" fill="#10151f" stroke="#ff5dd6" opacity=".95"/>
      <text x="24" y="40" fill="#f8fbff">LLM Layer</text>
      <text x="24" y="68" fill="#9fb0c4" font-size="15" font-weight="500">Gemma + RAG</text>
    </g>
    <g transform="translate(418 386)">
      <rect width="188" height="96" rx="8" fill="#10151f" stroke="#ffd166" opacity=".95"/>
      <text x="24" y="40" fill="#f8fbff">OCR</text>
      <text x="24" y="68" fill="#9fb0c4" font-size="15" font-weight="500">Plate pipeline</text>
    </g>
    <g transform="translate(720 250)">
      <rect width="178" height="104" rx="8" fill="#10151f" stroke="#a3ff6f" opacity=".95"/>
      <text x="24" y="42" fill="#f8fbff">Analytics</text>
      <text x="24" y="72" fill="#9fb0c4" font-size="15" font-weight="500">Reports + alerts</text>
    </g>
  </g>
  <g filter="url(#glow)">
    <circle cx="130" cy="320" r="9" fill="url(#node)"/>
    <circle cx="178" cy="160" r="7" fill="#ff5dd6"/>
    <circle cx="166" cy="462" r="8" fill="#ffd166"/>
    <circle cx="252" cy="86" r="7" fill="#63e6e2"/>
    <circle cx="485" cy="245" r="9" fill="#ff5dd6"/>
    <circle cx="475" cy="388" r="8" fill="#ffd166"/>
    <circle cx="736" cy="529" r="8" fill="#a3ff6f"/>
    <circle cx="843" cy="288" r="10" fill="#a3ff6f"/>
  </g>
</svg>
